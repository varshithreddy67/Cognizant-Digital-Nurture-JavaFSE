<h2>Student Registration</h2>

<form #studentForm="ngForm"
      (ngSubmit)="submitForm()">

<label>Name:</label>

<input 
type="text"
name="name"
[(ngModel)]="student.name"
required>

<br><br>

<label>Email:</label>

<input 
type="email"
name="email"
[(ngModel)]="student.email"
required>

<br><br>

<label>Course:</label>

<select 
name="course"
[(ngModel)]="student.course">

<option>Java FSE</option>
<option>Angular</option>
<option>Spring Boot</option>

</select>

<br><br>

<button 
type="submit"
[disabled]="studentForm.invalid">

Register

</button>

</form>
